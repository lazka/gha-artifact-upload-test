name: test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 60

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node 24
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: node-wrapper/package-lock.json
          check-latest: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install node wrapper dependencies
        run: npm ci
        working-directory: node-wrapper

      - name: Lint node wrapper
        run: npm run lint
        working-directory: node-wrapper

      - name: Type check node wrapper
        run: npm run tsc
        working-directory: node-wrapper

      - name: Build vendored node wrapper
        run: npm run build
        working-directory: node-wrapper

      - name: Check vendored node wrapper is up to date
        run: git diff --exit-code -- gha_artifact_client/_vendor

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Type check
        run: uv run ty check

      - name: Unit tests
        run: uv run pytest -m 'not integration'

      - name: Getting environment variables for integration test
        id: vars
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            core.setOutput('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])
            core.setOutput('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'])

      - name: Live integration tests
        env:
          ACTIONS_RUNTIME_TOKEN: ${{ steps.vars.outputs.ACTIONS_RUNTIME_TOKEN }}
          ACTIONS_RESULTS_URL: ${{ steps.vars.outputs.ACTIONS_RESULTS_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run pytest -m integration

      - name: Live CLI test
        env:
          ACTIONS_RUNTIME_TOKEN: ${{ steps.vars.outputs.ACTIONS_RUNTIME_TOKEN }}
          ACTIONS_RESULTS_URL: ${{ steps.vars.outputs.ACTIONS_RESULTS_URL }}
        run: |
          echo "cli test" > test.txt
          uv run gha-artifact-client upload test.txt

      - name: Live CLI test (zip artifact)
        env:
          ACTIONS_RUNTIME_TOKEN: ${{ steps.vars.outputs.ACTIONS_RUNTIME_TOKEN }}
          ACTIONS_RESULTS_URL: ${{ steps.vars.outputs.ACTIONS_RESULTS_URL }}
        run: |
          echo "zip contents" > zip_inner.txt
          python -m zipfile -c cli_test.zip zip_inner.txt
          uv run gha-artifact-client upload --name cli-test-zip cli_test.zip

      - name: Live CLI delete test
        env:
          ACTIONS_RUNTIME_TOKEN: ${{ steps.vars.outputs.ACTIONS_RUNTIME_TOKEN }}
          ACTIONS_RESULTS_URL: ${{ steps.vars.outputs.ACTIONS_RESULTS_URL }}
        run: |
          echo "to be deleted" > delete_me.txt
          uv run gha-artifact-client upload --name cli-delete-test delete_me.txt
          uv run gha-artifact-client delete cli-delete-test

      - name: Download test.txt artifact via actions/download-artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test.txt
          path: downloaded/test-txt

      - name: Verify downloaded test.txt
        run: |
          test -f downloaded/test-txt/test.txt
          grep -q "cli test" downloaded/test-txt/test.txt

      - name: Download zip artifact via actions/download-artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-test-zip
          path: downloaded/cli-test-zip

      - name: Verify zip artifact was unzipped by download-artifact
        run: |
          test -f downloaded/cli-test-zip/zip_inner.txt
          grep -q "zip contents" downloaded/cli-test-zip/zip_inner.txt

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/
